name: Publish candidate campaign

on:
  push:
    branches: [main]
    paths:
      - 'campaign-source.b64.part*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Expand campaign source
        run: |
          cat campaign-source.b64.part* | base64 --decode > campaign-source.tar.gz
          tar -xzf campaign-source.tar.gz
          rm campaign-source.b64.part* campaign-source.tar.gz
          rm .github/workflows/bootstrap-campaign.yml
      - name: Install document dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-urw-base35 fonts-dejavu-core
          python -m pip install --upgrade pip
          python -m pip install weasyprint pypdf
      - name: Add official identity and generate documents
        run: |
          mkdir -p assets/brand docs
          curl --fail --location --silent --show-error \
            https://www.usebraintrust.com/braintrust-logo.png \
            --output assets/brand/braintrust-logo.png
          python scripts/generate_pdfs.py
          python scripts/validate_release.py
      - name: Publish complete main tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish Braintrust candidate campaign'
          git push
